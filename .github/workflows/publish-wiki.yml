name: Publish Wiki

on:
  workflow_dispatch:
    inputs:
      source_dir:
        description: "Directory containing repo-controlled Wiki Markdown"
        required: false
        default: "soft-mmu-68k/docs/wiki"

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Wiki source directory
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ github.event.inputs.source_dir }}"
          test -d "$SRC"
          if grep -RInE '(:contentReference\[|oaicite:)' "$SRC"; then
            echo "Forbidden AI citation artifact found in Wiki source." >&2
            exit 1
          else
            echo "Wiki source artifact check passed."
          fi

      - name: Clone Wiki repository
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Remove explicitly stale Wiki pages
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ github.event.inputs.source_dir }}"
          DELETE_LIST="$SRC/.wiki-delete"
          if [ ! -f "$DELETE_LIST" ]; then
            echo "No explicit Wiki deletion list found."
            exit 0
          fi

          while IFS= read -r page || [ -n "$page" ]; do
            case "$page" in
              ''|'#'*) continue ;;
            esac
            case "$page" in
              */*|../*|/*)
                echo "Refusing unsafe Wiki delete entry: $page" >&2
                exit 1
                ;;
            esac
            if [ -f "wiki/$page" ]; then
              echo "Removing stale Wiki page: $page"
              rm -f "wiki/$page"
            else
              echo "Stale Wiki page not present: $page"
            fi
          done < "$DELETE_LIST"

      - name: Copy source pages into Wiki checkout
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ github.event.inputs.source_dir }}"
          rsync -av \
            --exclude 'README.md' \
            --exclude '.*' \
            --include '*/' \
            --include '*.md' \
            --exclude '*' \
            "$SRC/" wiki/

      - name: Commit and push Wiki updates
        shell: bash
        run: |
          set -euo pipefail
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No Wiki changes to publish."
            exit 0
          fi
          git add .
          git commit -m "Publish Wiki from repo-controlled docs"
          git push
